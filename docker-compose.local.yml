# docker-compose.local.yml — Service MCP seul (dev / test local)
#
# Sans WAF, sans S3 MinIO — accès direct au service MCP.
# S3 = remote via .env (S3_ENDPOINT_URL, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY).
#
# Usage :
#   docker compose -f docker-compose.local.yml build
#   docker compose -f docker-compose.local.yml up -d
#   docker compose -f docker-compose.local.yml logs -f
#
# Le service est accessible directement sur http://localhost:$MCP_SERVER_PORT
services:
  live-mem-service:
    build: .
    image: live-memory:latest
    ports:
      - "${MCP_SERVER_PORT}:${MCP_SERVER_PORT}"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${MCP_SERVER_PORT}/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
